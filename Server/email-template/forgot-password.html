
    <!DOCTYPE html>
    <html>
    <head>
      <meta charset="utf-8">
      <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f6f9; margin: 0; padding: 40px 20px; }
        .container { max-width: 520px; margin: 0 auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
        .header { background: linear-gradient(135deg, #4f46e5, #7c3aed); padding: 32px; text-align: center; }
        .header h1 { color: #ffffff; margin: 0; font-size: 24px; }
        .body { padding: 32px; color: #374151; line-height: 1.6; }
        .btn { display: inline-block; background: linear-gradient(135deg, #4f46e5, #7c3aed); color: #ffffff !important; text-decoration: none; padding: 14px 32px; border-radius: 8px; font-weight: 600; margin: 24px 0; }
        .footer { padding: 20px 32px; background: #f9fafb; color: #9ca3af; font-size: 13px; text-align: center; border-top: 1px solid #e5e7eb; }
      </style>
    </head>
    <body>
      <div class="container">
        <div class="header"><h1>TaskFlow</h1></div>
        <div class="body">
          <p>Hi {{firstName}},</p>
          <p>We received a request to reset your password. Click the button below to choose a new password. This link expires in 1 hour.</p>
          <a href="{{resetUrl}}" class="btn">Reset Password</a>
          <p style="font-size: 13px; color: #6b7280;">If you didn't request this, you can safely ignore this email.</p>
        </div>
        <div class="footer">&copy; {{date}} TaskFlow. All rights reserved.</div>
      </div>
    </body>
    </html>
